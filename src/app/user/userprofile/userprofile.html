<div class='card shadow-sm'>
    <div class='card-header bg-danger text-white fw-bold'>
      <i class='bi bi-pencil-square me-2'></i>Edit Profile
    </div>
    
    <div class='card-body'>
      @if (employee){
      <!-- TWO-WAY BINDING with [(ngModel)] -->
      <div class='mb-3'>
        <label class='form-label fw-semibold'>Full Name</label>
        <input [(ngModel)]='employee.firstname' name='name'
               class='form-control' placeholder='Full name'>
      </div>

      <div class='mb-3'>
        <label class='form-label fw-semibold'>Email</label>
        <input [(ngModel)]='employee.email' name='email' type='email'
               class='form-control' placeholder='Email address'>
      </div>

      <div class='mb-3'>
        <label class='form-label fw-semibold'>Location</label>
        <input [(ngModel)]='employee.departmentId' name='location'
               class='form-control' placeholder='City, Country'>
      </div>

      <div class='mb-3'>
        <label class='form-label fw-semibold'>Bio</label>
        <textarea [(ngModel)]='employee.position' name='bio' rows='3'
                  class='form-control' placeholder='Short biography'></textarea>
      </div>

      <div class='mb-3'>
        <label class='form-label fw-semibold'>Role</label>
        <select [(ngModel)]='employee.role' name='role' class='form-select'>
          <option value='Admin'>Admin</option>
          <option value='Editor'>Editor</option>
          <option value='Viewer'>Viewer</option>
        </select>
      </div>

      <!-- Live preview of two-way binding -->
      <div class='alert alert-info mt-3'>
        <strong>Live Preview:</strong>
        {{ employee.firstname }} — {{ employee.role }} from {{ employee.departmentId }}
      </div>

      <button class='btn btn-danger' (click)='save()'>
        <i class='bi bi-save me-1'></i>Save Changes
      </button>

      @if(saved){
      <span class='ms-3 text-success fw-semibold'>
        <i class='bi bi-check-circle me-1'></i>Saved!
      </span>}
      <button class='btn btn-danger' (click)='goBack()'>
        <i class='bi bi-save me-1'></i>Back
        </button>
  }
  </div>
